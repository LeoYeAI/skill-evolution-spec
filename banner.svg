<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#ffffff08" stroke-width="1">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
  </g>

  <!-- Glowing orbs -->
  <circle cx="120" cy="100" r="80" fill="#6366f1" opacity="0.12"/>
  <circle cx="680" cy="100" r="80" fill="#a855f7" opacity="0.12"/>
  <circle cx="400" cy="60" r="40" fill="#818cf8" opacity="0.08"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="800" height="3" fill="url(#accent)" rx="2"/>

  <!-- Icon: brain/circuit -->
  <g transform="translate(62, 70)" filter="url(#glow)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.9"/>
    <!-- Circuit nodes -->
    <circle cx="0" cy="-14" r="3" fill="#818cf8"/>
    <circle cx="12" cy="7" r="3" fill="#a855f7"/>
    <circle cx="-12" cy="7" r="3" fill="#6366f1"/>
    <!-- Circuit lines -->
    <line x1="0" y1="-14" x2="0" y2="0" stroke="#818cf8" stroke-width="1.5" opacity="0.8"/>
    <line x1="0" y1="0" x2="12" y2="7" stroke="#a855f7" stroke-width="1.5" opacity="0.8"/>
    <line x1="0" y1="0" x2="-12" y2="7" stroke="#6366f1" stroke-width="1.5" opacity="0.8"/>
    <circle cx="0" cy="0" r="4" fill="#c4b5fd"/>
    <!-- Outer ticks -->
    <line x1="0" y1="-28" x2="0" y2="-34" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
    <line x1="24" y1="14" x2="29" y2="17" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
    <line x1="-24" y1="14" x2="-29" y2="17" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Main title -->
  <text x="400" y="88" font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="36" font-weight="700" fill="#ffffff"
        text-anchor="middle" filter="url(#glow)">
    skill-evolution-spec
  </text>

  <!-- Accent underline -->
  <rect x="240" y="98" width="320" height="2" fill="url(#accent)" rx="1" opacity="0.8"/>

  <!-- Subtitle -->
  <text x="400" y="130" font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="14" font-weight="400" fill="#a5b4fc"
        text-anchor="middle" letter-spacing="0.5">
    Give your agent real self-evolution — not prompt tricks, engineering.
  </text>

  <!-- Bottom tags -->
  <g transform="translate(400, 160)" text-anchor="middle">
    <!-- Tag 1 -->
    <rect x="-190" y="-12" width="110" height="22" rx="11" fill="#6366f1" opacity="0.25"/>
    <text x="-135" y="4" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#a5b4fc">⚡ Skill Memory</text>
    <!-- Tag 2 -->
    <rect x="-68" y="-12" width="136" height="22" rx="11" fill="#7c3aed" opacity="0.25"/>
    <text x="0" y="4" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#c4b5fd">🧠 Lifecycle Curator</text>
    <!-- Tag 3 -->
    <rect x="80" y="-12" width="110" height="22" rx="11" fill="#4f46e5" opacity="0.25"/>
    <text x="135" y="4" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#a5b4fc">🔁 Self-Evolving</text>
  </g>

  <!-- MyClaw.ai watermark -->
  <text x="776" y="188" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="10" fill="#6366f1" text-anchor="end" opacity="0.7">
    MyClaw.ai
  </text>
</svg>
